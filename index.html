             <!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackout-Wallet | Elite Cryptocurrency Wallet</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Web3 Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bip39@3.0.4/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethereumjs-wallet@1.0.2/index.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethereumjs-wallet@1.0.2/hdkey.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.1/dist/web3.min.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="gradient-bg text-white min-h-screen font-mono">

    <header class="p-6 flex justify-between items-center">
        <h1 class="text-3xl font-bold text-neon-green">Blackout Wallet | Elite</h1>
        <button id="theme-toggle" class="px-4 py-2 border border-neon-blue rounded hover:shadow-neon transition">Toggle Theme</button>
    </header>

    <main class="p-8 flex flex-col gap-6">

        <!-- Wallet Card -->
        <div class="wallet-card p-6">
            <h2 class="wallet-balance text-2xl mb-4">Balance: 0 ETH</h2>
            <div class="flex gap-4">
                <button id="connect-wallet" class="wallet-btn">Connect Wallet</button>
                <button id="send-eth" class="wallet-btn">Send ETH</button>
            </div>
        </div>

        <!-- NFTs / Tokens Grid -->
        <div class="nft-grid">
            <div class="nft-card">
                <img src="https://via.placeholder.com/150" alt="NFT" class="rounded">
                <h3 class="mt-2 text-neon-purple font-bold">NFT #1</h3>
            </div>
            <div class="nft-card">
                <img src="https://via.placeholder.com/150" alt="NFT" class="rounded">
                <h3 class="mt-2 text-neon-purple font-bold">NFT #2</h3>
            </div>
            <!-- Add more NFT cards here -->
        </div>

    </main>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>                             </html>
