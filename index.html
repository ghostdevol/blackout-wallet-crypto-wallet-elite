<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blackout Wallet | GhosTech Edition</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bip39@3.0.4/index.min.js"></script>
<style>
/* Base Background */
body { background: radial-gradient(circle at top left, #0f0f1a 0%, #050a14 100%); color: #ccc; transition: all 0.3s ease; font-family: 'Segoe UI', sans-serif; }

/* GhosTech Neon Gradients */
.gradient-bg { background: radial-gradient(circle at 20% 20%, #0a0f1f 0%, #030712 100%); }
.wallet-card { background: rgba(10,10,20,0.85); border: 1px solid #00ffff; box-shadow: 0 0 15px #00ffff33, 0 0 30px #ff00ff22; transition: all 0.3s ease; border-radius: 1rem; }
.wallet-card:hover { transform: translateY(-6px); box-shadow: 0 0 25px #00ffffaa, 0 0 50px #ff00ffaa; }
.glow-btn { background: linear-gradient(90deg,#00ffff,#ff00ff); color:#000;font-weight:bold;box-shadow:0 0 10px #00ffff,0 0 20px #ff00ff; transition: all 0.2s ease; border-radius:0.5rem; }
.glow-btn:hover { transform: scale(1.05); box-shadow:0 0 20px #00ffff,0 0 40px #ff00ff; }
.neon-text { text-shadow:0 0 5px #00ffff,0 0 10px #ff00ff; }
.sidebar-glow a:hover { background: rgba(0,255,255,0.1); box-shadow:0 0 10px #00ffff44; }
.dark-table tbody tr:hover { background: rgba(255,0,255,0.05); }
.security-pin-input { letter-spacing:0.5em; font-size:1.5rem; background: rgba(0,0,0,0.6); border: 2px solid #00ffff; color:#0ff; text-align:center; border-radius:0.5rem; }
.nft-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:1rem; }
@media (max-width:768px) { .nft-grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); } }
</style>
</head>
<body class="min-h-screen gradient-bg">

<!-- Security PIN Modal -->
<div id="pinModal" class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 hidden">
    <div class="bg-gray-900 rounded-xl p-8 w-full max-w-md">
        <h2 class="text-2xl font-bold text-center neon-text mb-6">Enter Security PIN</h2>
        <div class="flex justify-center mb-6">
            <input type="password" id="pinInput" maxlength="6" class="security-pin-input outline-none" autocomplete="off">
        </div>
        <div class="grid grid-cols-3 gap-3 mb-6">
            <!-- PIN Buttons -->
            <template id="pin-btn-template">
                <button class="pin-btn bg-gray-800 hover:bg-gray-700 py-4 text-xl font-medium rounded-lg"></button>
            </template>
        </div>
        <div class="flex justify-between">
            <button id="skipPinBtn" class="px-4 py-2 glow-btn">Skip for now</button>
            <button id="submitPinBtn" class="px-4 py-2 glow-btn">Submit</button>
        </div>
    </div>
</div>

<!-- Main App -->
<div class="container mx-auto px-4 py-6">
    <!-- Header -->
    <header class="flex justify-between items-center mb-8">
        <div class="flex items-center">
            <div class="w-10 h-10 rounded-full bg-cyan-600 flex items-center justify-center mr-3 neon-text">
                <i class="fas fa-wallet text-white"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wider neon-text">
                <span class="text-cyan-400 drop-shadow-[0_0_10px_#00ffff]">Blackout</span>
                <span class="text-fuchsia-500 drop-shadow-[0_0_10px_#ff00ff]">Wallet</span>
            </h1>
        </div>
        <div class="flex items-center space-x-4">
            <button id="themeToggle" class="p-2 rounded-full glow-btn">
                <i class="fas fa-moon"></i>
            </button>
            <div class="relative">
                <button id="userMenuBtn" class="flex items-center space-x-2 glow-btn px-3 py-2">
                    <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center neon-text">
                        <i class="fas fa-user text-white"></i>
                    </div>
                    <span>Account</span>
                </button>
                <div id="userMenu" class="absolute right-0 mt-2 w-48 bg-gray-900 rounded-lg shadow-lg z-10 hidden">
                    <div class="py-1">
                        <a href="#" class="block px-4 py-2 hover:bg-gray-800">Settings</a>
                        <a href="#" class="block px-4 py-2 hover:bg-gray-800">Security</a>
                        <a href="#" class="block px-4 py-2 hover:bg-gray-800">Backup Wallet</a>
                        <div class="border-t border-gray-700"></div>
                        <a href="#" class="block px-4 py-2 hover:bg-gray-800 text-red-400">Logout</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Content -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
        <!-- Sidebar -->
        <div class="lg:col-span-1">
            <div class="wallet-card sidebar-glow p-4 mb-6">
                <h3 class="font-semibold text-lg mb-4 neon-text">Navigation</h3>
                <nav>
                    <ul class="space-y-2">
                        <li><a href="#" class="flex items-center space-x-3 p-2 rounded-lg hover:bg-gray-800"><i class="fas fa-home w-5 neon-text"></i><span>Dashboard</span></a></li>
                        <li><a href="#" class="flex items-center space-x-3 p-2 rounded-lg hover:bg-gray-800"><i class="fas fa-exchange-alt w-5 neon-text"></i><span>Send/Receive</span></a></li>
                        <li><a href="#" class="flex items-center space-x-3 p-2 rounded-lg hover:bg-gray-800"><i class="fas fa-chart-line w-5 neon-text"></i><span>Market Watch</span></a></li>
                        <li><a href="#" class="flex items-center space-x-3 p-2 rounded-lg hover:bg-gray-800"><i class="fas fa-image w-5 neon-text"></i><span>NFT Vault</span></a></li>
                        <li><a href="#" class="flex items-center space-x-3 p-2 rounded-lg hover:bg-gray-800"><i class="fas fa-code w-5 neon-text"></i><span>Developer Tools</span></a></li>
                        <li><a href="#" class="flex items-center space-x-3 p-2 rounded-lg hover:bg-gray-800"><i class="fas fa-users w-5 neon-text"></i><span>Elite Network</span></a></li>
                        <li><a href="#" class="flex items-center space-x-3 p-2 rounded-lg hover:bg-gray-800"><i class="fas fa-cog w-5 neon-text"></i><span>Settings</span></a></li>
                    </ul>
                </nav>
            </div>

            <div class="wallet-card p-4 glow-btn">
                <h3 class="font-semibold text-lg mb-4 neon-text">Quick Actions</h3>
                <div class="space-y-3">
                    <button id="createWalletBtn" class="w-full glow-btn py-2 px-4"><i class="fas fa-plus"></i> Create Wallet</button>
                    <button id="importWalletBtn" class="w-full glow-btn py-2 px-4"><i class="fas fa-file-import"></i> Import Wallet</button>
                    <button id="connectDappBtn" class="w-full glow-btn py-2 px-4"><i class="fas fa-plug"></i> Connect dApp</button>
                </div>
            </div>
        </div>

        <!-- Main Area -->
        <div class="lg:col-span-3 space-y-6">
            <!-- Wallet Overview & Transactions kept intact -->
            <!-- Copy all your wallet cards, tables, market watch here, replacing bg-gray with .wallet-card for glow -->
        </div>
    </div>
</div>
<script src="viewer.js"></script>
</body>
</html>
