<body class="gradient-bg text-white min-h-screen font-mono">

<header class="p-6 flex justify-between items-center">
    <h1 class="text-3xl font-bold text-neon-green">Blackout Wallet | Elite</h1>
    <button id="theme-toggle" class="px-4 py-2 border border-neon-blue rounded hover:shadow-neon transition">
        Toggle Theme
    </button>
</header>

<main class="p-8 flex flex-col gap-6">
    <!-- Wallet Card -->
    <div class="wallet-card p-6">
        <h2 class="wallet-balance text-2xl mb-4">Balance: 0 ETH</h2>
        <div class="flex gap-4">
            <button id="connect-wallet-main" class="wallet-btn">Connect Wallet</button>
            <button id="send-eth-main" class="wallet-btn">Send ETH</button>
        </div>
    </div>

    <!-- NFTs / Tokens Grid -->
    <div class="nft-grid">
        <div class="nft-card">
            <img src="https://via.placeholder.com/150" alt="NFT" class="rounded">
            <h3 class="mt-2 text-neon-purple font-bold">NFT #1</h3>
        </div>
        <div class="nft-card">
            <img src="https://via.placeholder.com/150" alt="NFT" class="rounded">
            <h3 class="mt-2 text-neon-purple font-bold">NFT #2</h3>
        </div>
    </div>
</main>

<!-- JS -->
<script src="viewer.js"></script>
