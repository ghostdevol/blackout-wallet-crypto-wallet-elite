<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackout Wallet | Elite Crypto Wallet</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.1/dist/web3.min.js"></script>
</head>
<body>

<header>
    <h1>Blackout Wallet | Elite</h1>
    <button id="connect-btn" class="wallet-btn">Connect Wallet</button>
</header>

<main class="p-4">

    <!-- Wallet Cards -->
    <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        <div class="wallet-card">
            <h2>Balance</h2>
            <p id="wallet-balance">0 ETH</p>
        </div>
        <div class="wallet-card">
            <h2>Address</h2>
            <p id="wallet-address">Not connected</p>
        </div>
        <div class="wallet-card">
            <h2>Network</h2>
            <p id="wallet-network">N/A</p>
        </div>
    </section>

    <!-- NFT Gallery -->
    <section>
        <h2>NFT Gallery</h2>
        <div class="nft-grid" id="nft-grid">
            <!-- NFT cards added dynamically -->
        </div>
    </section>

    <!-- Token Swap / Send -->
    <section class="mt-8">
        <h2>Send / Swap Tokens</h2>
        <div class="flex flex-col md:flex-row gap-2 mt-2">
            <input type="text" id="recipient" placeholder="Recipient Address">
            <input type="number" id="amount" placeholder="Amount">
            <select id="token-select">
                <option value="ETH">ETH</option>
                <option value="DAI">DAI</option>
            </select>
            <button id="swap-btn" class="wallet-btn">Send / Swap</button>
        </div>
    </section>

</main>

<script src="viewer.js"></script>
</body>
</html>
